<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Community Event Portal</title>

    <link rel="stylesheet"
    href="../module1-css/style.css">

</head>

<body>

    <!-- Navigation -->

    <div id="navbar">

        <a href="#">Home</a>

        <a href="#events">Events</a>

        <a href="#footer">Contact</a>

        <a href="help.html"
        target="_blank">

        Help

        </a>

    </div>

    <!-- Welcome Banner -->

    <div id="welcomeBanner">

        <h1>
            Welcome to Community Events
        </h1>

        <span class="offer">
            Special Offer!
        </span>

        <p>
            First 20 registrations
            will get 10% discount
        </p>

        <p class="highlight">
            Hurry! Seats are Limited
        </p>

        <a href="register.html"
        target="_blank">

            <button>
                Register Now
            </button>

        </a>

    </div>

    <!-- Events -->

    <div id="events">

        <h1>Past Event Images</h1>

        <div id="eventContainer"></div>

    </div>

    <!-- Footer -->

    <div id="footer">

        <h1>Contact Us</h1>

        <p>
            Email :
            communityevents@gmail.com
        </p>

        <p>
            Phone :
            9876543210
        </p>

        <h2>Feedback Form</h2>

        <form id="registerForm">

            <label>Name:</label>

            <input type="text"
            name="username"
            placeholder="Enter your name"
            required autofocus>

            <label>Email:</label>

            <input type="email"
            name="email"
            placeholder="Enter your email"
            required>

            <label>Phone:</label>

            <input type="text"
            id="phone"
            placeholder="Enter phone number"
            onblur="validatePhone()"
            required>

            <label>Event Type:</label>

            <select id="eventType"
            onchange="showFee()"
            required>

                <option value="">
                    Select Event
                </option>

                <option value="500">
                    Workshop
                </option>

                <option value="1000">
                    Hackathon
                </option>

                <option value="1500">
                    Seminar
                </option>

            </select>

            <p id="fee"></p>

            <label>Feedback:</label>

            <textarea id="feedback"
            placeholder="Enter feedback"
            onkeyup="countCharacters()"></textarea>

            <p>
                Characters Typed :
                <span id="count">0</span>
            </p>

            <button type="submit">
                Submit Feedback
            </button>

            <p id="message"></p>

        </form>

    </div>

    <script src=
    "../module1-javascript/main.js">

    </script>

</body>

</html>
